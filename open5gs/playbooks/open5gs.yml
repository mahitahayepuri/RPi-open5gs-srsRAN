# playbooks/open5gs.yml
---
# 1) Run preflight (shared Pi validation from common/)
- import_playbook: ../../common/playbooks/preflight/main.yml

# 2) (Optional) Alias a computed group to 'candidate'
- name: "Alias preflight_pass → candidate"
  hosts: preflight_pass
  gather_facts: false
  tasks:
    - name: "Tag host as 'candidate'"
      ansible.builtin.group_by:
        key: "candidate"
  # group_by creates an in-memory group that later plays can target [2](https://www.techtransit.org/ansible-setup-module/)

# 3) Harden Pi for headless server use (shared from common/)
- import_playbook: ../../common/playbooks/pi_setup.yml

# 4) Install Open5GS (Docker, MongoDB, TUN, apt-or-source install, start services)
#    Controlled by open5gs_install_method ("apt" or "source") in group_vars.
- import_playbook: open5gs_install/main.yml
