---
- name: "Open5GS | Install Docker CE"
  hosts: candidate:&core
  become: true
  gather_facts: true

  tasks:
    - name: "Install prerequisites"
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: "Create keyrings directory"
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: "Download Docker GPG key"
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc.armored
        mode: "0644"
      register: docker_key_download

    - name: "De-armor Docker GPG key"
      ansible.builtin.shell: |
        set -euo pipefail
        gpg --dearmor < /etc/apt/keyrings/docker.asc.armored > /etc/apt/keyrings/docker.gpg
      args:
        executable: /bin/bash
        creates: /etc/apt/keyrings/docker.gpg

    # Raspberry Pi OS reports VERSION_CODENAME from the Debian base (trixie),
    # but Docker may not publish a trixie-specific repo yet. Fall back to
    # bookworm if the trixie repo is unavailable.
    - name: "Determine Debian codename for Docker repo"
      ansible.builtin.set_fact:
        _docker_codename: "{{ ansible_facts['distribution_release'] | lower }}"

    - name: "Check if Docker publishes packages for {{ _docker_codename }}"
      ansible.builtin.uri:
        url: "https://download.docker.com/linux/debian/dists/{{ _docker_codename }}/Release"
        method: HEAD
      register: _docker_repo_check
      failed_when: false

    - name: "Fall back to bookworm if {{ _docker_codename }} repo unavailable"
      ansible.builtin.set_fact:
        _docker_codename: "bookworm"
      when: _docker_repo_check.status | default(0) != 200

    - name: "Add Docker apt repository"
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ docker_repo_arch }}
          signed-by=/etc/apt/keyrings/docker.gpg]
          https://download.docker.com/linux/debian
          {{ _docker_codename }} stable
        filename: docker
        state: present

    - name: "Install Docker packages"
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: true

    - name: "Enable and start Docker service"
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started
        daemon_reload: true

    - name: "Add {{ pi_user }} to docker group"
      ansible.builtin.user:
        name: "{{ pi_user }}"
        groups: docker
        append: true
