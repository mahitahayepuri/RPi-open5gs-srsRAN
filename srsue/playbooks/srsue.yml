# It does NOT re-run preflight or pi_setup (the gNB Pi is already configured).
#
# Usage:
#   ansible-playbook -i inventory-pi5.ini srsue/playbooks/srsue.yml
---

# Build, install, and configure srsUE on the gNB Pi
- import_playbook: srsue_install/main.yml
