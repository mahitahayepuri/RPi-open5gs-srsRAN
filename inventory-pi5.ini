# Pi 5 test pair
# Core = Open5GS 5G core    |  gNB = srsRAN base station
#
# Usage:
#   ansible-playbook -i inventory-pi5.ini open5gs/playbooks/open5gs.yml
#   ansible-playbook -i inventory-pi5.ini srsran/playbooks/srsran.yml
#   ansible-playbook -i inventory-pi5.ini srsue/playbooks/srsue.yml

[core]
192.168.2.72 ansible_user=pi open5gs_ran_addr=10.53.5.1

[gnb]
192.168.2.55 ansible_user=pi srsran_amf_addr=10.53.5.1 srsran_gnb_bind_addr=10.53.5.2 srsran_grafana_gnb_addr=10.53.5.2

# srsUE runs on the same Pi as the gNB (ZMQ uses localhost sockets)
[ue:children]
gnb

# All Pis — used by preflight and pi_setup
[rpi:children]
core
gnb

# Grafana metrics stack runs on the core Pi
[grafana:children]
core
