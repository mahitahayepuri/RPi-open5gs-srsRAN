---
# srsRAN installation pipeline (runs on hosts that passed preflight)

- import_playbook: build_deps.yml
- import_playbook: compile.yml
- import_playbook: install.yml
- import_playbook: network.yml

# Grafana metrics dashboard (runs on the [grafana] host, e.g. the Open5GS Pi)
# Auto-detects srsRAN version and deploys the matching stack:
#   release_24  →  metrics_server + InfluxDB 2 + Grafana 10
#   release_25+ →  Telegraf + InfluxDB 3 + Grafana 12
- import_playbook: grafana.yml
