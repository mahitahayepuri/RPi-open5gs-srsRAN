---
- name: "srsRAN | Deploy Grafana metrics dashboard"
  hosts: grafana
  become: true
  gather_facts: true

  tasks:
    - name: "Verify Docker is available on the Grafana host"
      ansible.builtin.command: docker --version
      changed_when: false
      failed_when: false
      register: _docker_check

    - name: "Fail if Docker is not installed"
      ansible.builtin.fail:
        msg: >-
          Docker is not installed on {{ inventory_hostname }}.
          Run the Open5GS playbook first to install Docker, or install it manually.
      when: _docker_check.rc != 0

    # The srsRAN repo ships a complete Docker-based Grafana stack under
    # docker/ -- Telegraf, InfluxDB 3, and Grafana with pre-built dashboards.
    # We clone the repo to get those files, then customise the .env to
    # point Telegraf at the gNB's metrics WebSocket.

    - name: "Clone srsRAN Project repository (for docker/ directory)"
      ansible.builtin.git:
        repo: "{{ srsran_source_repo }}"
        dest: "{{ srsran_grafana_source_dir }}"
        version: "{{ srsran_source_version }}"
        depth: 1
        force: true
      environment:
        GIT_TERMINAL_PROMPT: "0"

    # Override the upstream .env with our settings so Telegraf connects
    # to the gNB on the remote Pi rather than a local Docker container.
    # Version pins match the upstream srsRAN docker/.env at time of writing.
    - name: "Deploy customised .env for the Grafana stack"
      ansible.builtin.copy:
        dest: "{{ srsran_grafana_source_dir }}/docker/.env"
        mode: "0644"
        content: |
          ## Telegraf
          WS_URL={{ srsran_grafana_gnb_addr }}:8001
          TELEGRAF_VERSION=1.35.0
          TELEGRAF_INPUT_INTERVAL=1s
          TELEGRAF_OUTPUT_INTERVAL=1s
          TELEGRAF_BUFFER_LIMIT=10000

          ## InfluxDB
          INFLUXDB3_VERSION=3.1.0-core
          INFLUXDB3_PORT=8081
          INFLUXDB3_HTTP_BIND_ADDR=0.0.0.0:8081
          INFLUXDB3_HOST_URL=http://127.0.0.1:8081
          INFLUXDB3_EXTERNAL_URL=http://influxdb:8081
          # Lab-only placeholder token; InfluxDB Core edition does not enforce auth
          INFLUXDB3_AUTH_TOKEN=fake-token-1234567890abcdef
          INFLUXDB3_BUCKET=srsran
          INFLUXDB3_TESTBED=default
          INFLUXDB3_LOG_LEVEL=error
          INFLUXDB3_RATE_LIMIT=0
          INFLUXDB3_RATE_LIMIT_PERIOD=0s

          ## Grafana
          GF_VERSION=12.0.2
          GF_PORT={{ srsran_grafana_port }}
          GF_LOGO_URL=https://raw.githubusercontent.com/srsran/srsRAN_Project_docs/main/docs/source/.imgs/logo.png
          GF_AUTH_ANONYMOUS_ENABLED=true
          GF_LOG_LEVEL=warning
          GF_DASHBOARDS_MIN_REFRESH_INTERVAL=1s
          GF_PLUGINS_PLUGIN_ADMIN_ENABLED=false

    - name: "Build and start Grafana stack (Telegraf + InfluxDB + Grafana)"
      ansible.builtin.shell: >
        docker compose -f docker-compose.ui.yml up -d --build
      args:
        chdir: "{{ srsran_grafana_source_dir }}/docker"
      register: _grafana_compose
      changed_when: "'Started' in _grafana_compose.stderr or 'Created' in _grafana_compose.stderr"

    - name: "Show Grafana access URL"
      ansible.builtin.debug:
        msg: "Grafana UI available at http://{{ ansible_default_ipv4.address }}:{{ srsran_grafana_port }}"
