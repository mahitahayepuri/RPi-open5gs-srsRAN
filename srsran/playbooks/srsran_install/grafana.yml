---
# Grafana metrics dashboard — version-aware dispatcher
#
# The srsRAN Project changed its metrics architecture between releases:
#   release_24_10_1  →  gNB pushes JSON over UDP → metrics_server → InfluxDB 2
#   release_25_x+    →  gNB exposes WebSocket → Telegraf pulls → InfluxDB 3
#
# This play detects the version and delegates to the appropriate task file.

- name: "srsRAN | Deploy Grafana metrics dashboard"
  hosts: grafana
  become: true
  gather_facts: true

  tasks:
    - name: "Verify Docker is available on the Grafana host"
      ansible.builtin.command: docker --version
      changed_when: false
      failed_when: false
      register: _docker_check

    - name: "Fail if Docker is not installed"
      ansible.builtin.fail:
        msg: >-
          Docker is not installed on {{ inventory_hostname }}.
          Run the Open5GS playbook first to install Docker, or install it manually.
      when: _docker_check.rc != 0

    - name: "Clone srsRAN Project repository (for docker/ directory)"
      ansible.builtin.git:
        repo: "{{ srsran_source_repo }}"
        dest: "{{ srsran_grafana_source_dir }}"
        version: "{{ srsran_source_version }}"
        depth: 1
        force: true
      environment:
        GIT_TERMINAL_PROMPT: "0"

    # Detect which metrics architecture to use from the cloned repo.
    # docker-compose.ui.yml only exists in releases that ship the
    # Telegraf + InfluxDB 3 stack (release_25_10+).  Older releases
    # (release_24_*, release_25_04) use docker-compose.yml with
    # metrics_server + InfluxDB 2.
    - name: "Check for docker-compose.ui.yml (Telegraf stack marker)"
      ansible.builtin.stat:
        path: "{{ srsran_grafana_source_dir }}/docker/docker-compose.ui.yml"
      register: _compose_ui

    - name: "Set metrics stack variant"
      ansible.builtin.set_fact:
        _grafana_variant: "{{ 'v25' if _compose_ui.stat.exists else 'v24' }}"

    - name: "Deploy Grafana stack (release_24 — metrics_server + InfluxDB 2)"
      ansible.builtin.include_tasks: tasks/grafana_24.yml
      when: _grafana_variant == 'v24'

    - name: "Deploy Grafana stack (release_25+ — Telegraf + InfluxDB 3)"
      ansible.builtin.include_tasks: tasks/grafana_25.yml
      when: _grafana_variant == 'v25'

    - name: "Show Grafana access URL"
      ansible.builtin.debug:
        msg: "Grafana UI available at http://{{ ansible_default_ipv4.address }}:{{ srsran_grafana_port }}"
