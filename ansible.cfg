[defaults]
# Disable host key checking so first-run SSH to freshly-imaged Pis doesn't
# prompt interactively (safe in a lab environment).
host_key_checking = False

# Reduce SSH round-trips per task — significant speedup on Pi hardware.
pipelining = True

# Default timeout for SSH connections (seconds). Generous for slow Pi 4
# boot and apt operations.
timeout = 30

[ssh_connection]
# Reuse SSH connections across tasks (multiplexing). ControlPersist keeps
# the master connection alive for 60 seconds after the last task.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30
